<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - Daus Drawing Official</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body style="overflow: hidden;">

    <div class="top-bar">
        <div class="top-left">
            <button onclick="window.location.href='index.html'">Keluar</button>
            <input type="text" id="nama-project-saat-ini">
        </div>
        <div>
            <select id="opsi-simpan" onchange="tanganiSimpan(this.value)">
                <option value="" disabled selected>Pilih Aksi...</option>
                <option value="draf">Simpan sebagai Draf</option>
                <option value="simpan">Simpan Final</option>
            </select>
        </div>
    </div>

    <canvas id="drawing-canvas"></canvas>

    <div class="tools-bottom">
        <label>Warna:</label>
        <input type="color" id="input-warna" value="#000000">
        
        <label>Ukuran:</label>
        <input type="range" id="ukuran-kuas" min="1" max="50" value="5">
        
        <button onclick="undo()">Undo</button>
        <button onclick="redo()">Redo</button>
        <button class="btn-hapus" onclick="hapusSemuaKuas()">Hapus Semua</button>
    </div>

    <div class="watermark">Daus XD</div>

    <script src="script.js"></script>
    <script>
        window.onload = initCanvas;
    </script>
</body>
</html>
